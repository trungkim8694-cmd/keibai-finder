name: Daily Parallel Keibai Crawler

on:
  schedule:
    # 20:00 UTC = 5:00 AM JST (Chạy 2 ngày 1 lần)
    - cron: '0 20 */2 * *'
  workflow_dispatch:

jobs:
  scrape_bit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install -r crawler/requirements.txt
          playwright install chromium
          playwright install-deps
      - name: Run BIT Crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          cd crawler
          python advanced_crawler.py

  scrape_nta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Dependencies
        run: |
          pip install -r crawler/requirements.txt
          playwright install chromium
          playwright install-deps
      - name: Run NTA Crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          cd crawler
          python nta_parser.py

  post_processing:
    needs: [scrape_bit, scrape_nta]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Dependencies
        run: pip install -r crawler/requirements.txt
      
      - name: MLIT Calculator
        id: mlit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd crawler
          if python mlit_calculator.py; then echo "status=success" >> $GITHUB_OUTPUT; else echo "status=failure" >> $GITHUB_OUTPUT; fi
          
      - name: Cleanup Images
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd crawler
          python cleanup_property_images.py --delete || echo "Cleanup failed but proceeding"
          
      - name: AI SEO Writer
        id: seo
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd crawler
          if python ai_seo_writer.py; then echo "status=success" >> $GITHUB_OUTPUT; else echo "status=failure" >> $GITHUB_OUTPUT; fi

      - name: Cache Revalidation & Telegram Notification
        if: ${{ needs.scrape_bit.result == 'success' && needs.scrape_nta.result == 'success' }}
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Trigger Cache Webhook
          CACHE_STATUS="[Bỏ qua - Chưa cài Webhook]"
          if [ -n "$FRONTEND_URL" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST -H "Authorization: Bearer ${WEBHOOK_SECRET:-keibai_super_secret_4am}" "$FRONTEND_URL/api/revalidate-cache")
            if [ "$HTTP_CODE" == "200" ]; then
                CACHE_STATUS="Đã thành công ✅"
            else
                CACHE_STATUS="Thất bại (HTTP $HTTP_CODE) ❌"
            fi
            echo "Cache Webhook Status: $HTTP_CODE"
          fi
          
          # 2. Inform Telegram
          cd crawler
          
          MLIT_VAL="${{ steps.mlit.outputs.status }}"
          SEO_VAL="${{ steps.seo.outputs.status }}"
          
          MLIT_TXT="Đã thành công ✅"
          if [ "$MLIT_VAL" != "success" ]; then MLIT_TXT="Thất bại ❌"; fi
          
          SEO_TXT="Đã thành công ✅"
          if [ "$SEO_VAL" != "success" ]; then SEO_TXT="Thất bại ❌"; fi
          
          MSG="🏠 <b>Keibai Finder - Daily Report</b>%0A📅 $(date +'%Y-%m-%d %H:%M JST')%0A1️⃣ Dữ liệu BIT/NTA đã rà quét xong.%0A2️⃣ Thẩm Định Giá MLIT: $MLIT_TXT%0A3️⃣ Bản Tin AI Insights: $SEO_TXT%0A4️⃣ Bộ đệm Edge Cache: $CACHE_STATUS"
          python telegram_notify.py "$MSG"

      - name: Telegram Notification - Failure
        if: ${{ needs.scrape_bit.result != 'success' || needs.scrape_nta.result != 'success' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd crawler
          python telegram_notify.py "⚠️ <b>Crawler THẤT BẠI</b>%0A📅 $(date +'%Y-%m-%d %H:%M JST')%0AMột tiến trình trong GitHub Actions (BIT hoặc NTA) đã gặp sự cố. Vui lòng kiểm tra tab Actions trên Github."
